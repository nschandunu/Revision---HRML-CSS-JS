<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        #clubSelect {
            padding: 8px 16px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: #fff;
            color: #333;
            outline: none;
        }

        #clubSelect:focus {
            border-color: #888;
        }

        #clubImage {
            width: 300px;
            height: 300px;
            object-fit: contain;
            margin-top: 24px;
            padding: 20px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body>
    <h1>Image Gallery</h1>
    <select id="clubSelect">
    </select>
    <img id="clubImage" src="" alt="Club Badge">

    <script>
        const clubs = [
            { name: "Arsenal", file: "Arsenal_FC.svg" },
            { name: "FC Barcelona", file: "FC_Barcelona_(crest).svg.png" },
            { name: "Manchester United", file: "Manchester_United_FC_crest.svg.png" },
            { name: "Manchester City", file: "Manchester_City_FC_badge.svg.png" },
            { name: "Bayern München", file: "FC_Bayern_München_logo_(2024).svg.png" },
            { name: "Real Madrid", file: "Real_Madrid_CF.svg.png" },
            { name: "Liverpool", file: "Liverpool_FC.svg.png" },
            { name: "Tottenham Hotspur", file: "Tottenham_Hotspur.svg.png" },
            { name: "Paris Saint-Germain", file: "Paris_Saint-Germain_F.C..svg.png" },
            { name: "AC Milan", file: "Logo_of_AC_Milan.svg.png" },
            { name: "Garfield", file: "GarfieldNoBackground.webp" },
            { name: "Odie", file: "images.png" },
            { name: "Nermal", file: "NermalCharacter.webp" },
            { name: "Pooky", file: "PookyCharacter.webp" },
            { name: "Jon Arbuckle", file: "Jon_Q._Arbuckle.webp" }
        ];
        const select = document.getElementById("clubSelect");
        const image = document.getElementById("clubImage");

        clubs.forEach(function (club) {
            const option = document.createElement("option");
            option.value = club.file;
            option.textContent = club.name;
            select.appendChild(option);
        });

        image.src = "images/" + select.value;

        select.addEventListener("change", function () {
            image.src = "images/" + select.value;
        });

    </script>
</body>
</html>
